<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AETicketHub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <a href="index.html">
            <img src="AE logo.png.png" alt="AETicketHub Logo" class="nav-logo">
        </a>
        <ul class="nav-links"></ul>
    </nav>

    <div class="container auth-wrapper">
        <div style="flex:1; background:white; padding:30px; border-radius:8px; box-shadow:0 4px 6px rgba(0,0,0,0.1);">
            <h2>System Login</h2>
            <p style="color: #666; font-size: 14px;">Log in to book tickets or access the admin panel.</p>
            <form id="loginForm">
                <label>Username</label>
                <input type="text" id="loginUser" required>
                <label>Password</label>
                <input type="password" id="loginPass" required>
                <span id="loginMsg" class="error"></span>
                <button type="submit">Log In</button>
            </form>
            <div style="margin-top: 20px; padding: 10px; background: #eef2fa; border-radius: 4px; font-size: 13px;">
                <strong>Lecturer Note:</strong> To test the Admin Dashboard, log in with username: <code>admin</code> and password: <code>admin123</code> (Simulated IT provisioned account).
            </div>
        </div>

        <div style="flex:1; background:white; padding:30px; border-radius:8px; box-shadow:0 4px 6px rgba(0,0,0,0.1);">
            <h2>Register as Customer</h2>
          
            <form id="regForm">
                <label>Full Name</label>
                <input type="text" id="regFullName" placeholder="e.g. Johannes Gerharddus" required>

                <label>Email Address</label>
                <input type="email" id="regEmail" placeholder="kevin@belgiumcampus.ac.za" required>

                <label>ID Number</label>
                <input type="text" id="regIdNumber" placeholder="13-digit SA ID" required>

                <label>Telephone Number</label>
                <input type="tel" id="regPhone" placeholder="082 123 4567" required>

                <hr>

                <label>Choose a Username</label>
                <input type="text" id="regUser" required>
                
                <label>Create a Password</label>
                <input type="password" id="regPass" required>
                
                <span id="regMsg" class="error"></span>
                <button type="submit">Create Account</button>
            </form>
        </div>
    </div>

    <script src="/script.js"></script>
</body>
</html>
